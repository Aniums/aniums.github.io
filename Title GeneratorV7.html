<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sequence Pro - v63</title>
    <style id="theme-style">
        :root {
            --bg-color: #f0f2f5;
            --box-bg: #ffffff;
            --accent: #007aff;
            --nav-height: 65px;
            --page-text-main: #222;
            --page-text-muted: #5f6368;
            --page-border: rgba(128,128,128,0.2);
            --machine-bg: #1e1e1e;
            --slot-text-muted: #555;
            --slot-text-active: #ffffff;
            --item-height: 50px;
            --lens-bg: rgba(0, 122, 255, 0.1);
            --slot-radius: 8px;
            --update-red: #b71c1c;
            --template-green: #27ae60;
            --delete-red: #e74c3c;
        }

        body.theme-dark {
            --bg-color: #121212;
            --box-bg: #1e1e1e;
            --page-text-main: #e0e0e0;
            --page-text-muted: #9aa0a6;
            --page-border: rgba(255,255,255,0.1);
            --accent: #007aff;
        }

        body.rounder-slots { --slot-radius: 25px; }

        body.no-animations *, body.no-animations *::before, body.no-animations *::after {
            transition: none !important;
            animation: none !important;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background-color: var(--bg-color); color: var(--page-text-main); user-select: none; transition: background 0.3s; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

        .navbar { position: fixed; top: 0; left: 0; right: 0; height: var(--nav-height); background: #dee1e6; display: flex; align-items: flex-end; padding: 0 30px; z-index: 1000; }
        body.theme-dark .navbar { background: #202124; }
        
        .hover-toggle-container { display: flex; align-items: center; gap: 5px; margin-bottom: 15px; margin-right: 15px; font-size: 10px; font-weight: bold; color: var(--page-text-muted); text-transform: uppercase; }
        .hover-toggle-container input { cursor: pointer; margin: 0; width: 12px; height: 12px; }

        .nav-links { display: flex; align-items: flex-end; height: 100%; flex-grow: 1; justify-content: center; }
        .nav-item { color: var(--page-text-muted); text-decoration: none; font-weight: 700; font-size: 15px; cursor: pointer; padding: 12px 45px; border-radius: 12px 12px 0 0; margin: 0 -5px; position: relative; transition: color 0.2s, background 0.2s; text-align: center; min-width: 140px; }
        .nav-item.active { background: var(--box-bg); color: var(--accent); z-index: 5; }
        .nav-item.active::before { content: ''; position: absolute; bottom: 0; width: 20px; height: 20px; left: -20px; box-shadow: 10px 10px 0 0 var(--box-bg); border-bottom-right-radius: 15px; }
        .nav-item.active::after { content: ''; position: absolute; bottom: 0; width: 20px; height: 20px; right: -20px; box-shadow: -10px 10px 0 0 var(--box-bg); border-bottom-left-radius: 15px; }

        .nav-right { position: absolute; right: 30px; bottom: 15px; }
        .settings-menu { position: absolute; top: 60px; right: 40px; width: 260px; background: var(--box-bg); border: 1px solid var(--page-border); border-radius: 12px; padding: 15px; display: none; z-index: 1100; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .settings-menu.open { display: block; }
        .setting-row { display: flex; align-items: center; justify-content: space-between; font-size: 11px; font-weight: bold; text-transform: uppercase; color: var(--page-text-muted); margin-bottom: 12px; }
        
        .reset-btn { width: 100%; padding: 8px; font-size: 10px; font-weight: bold; color: white; background: var(--delete-red); border: none; border-radius: 4px; cursor: pointer; margin-top: 10px; opacity: 0.8; transition: opacity 0.2s; }
        .reset-btn:hover { opacity: 1; }

        .page-content { margin-top: var(--nav-height); width: 100%; max-width: 1300px; display: none; flex-grow: 1; }
        .page-content.active { display: block; }
        .generator-container { background: var(--box-bg); padding: 40px; border-radius: 0 0 16px 16px; border: 1px solid var(--page-border); border-top: none; }

        .picker-wrapper { display: flex; position: relative; height: calc(var(--item-height) * 3); background: var(--machine-bg); border-radius: var(--slot-radius); overflow: hidden; margin-bottom: 30px; border: 3px solid #333; transition: border-radius 0.3s; }
        .picker-wrapper::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; height: var(--item-height); background: var(--lens-bg); transform: translateY(-50%); pointer-events: none; z-index: 10; border-radius: var(--slot-radius); transition: border-radius 0.3s; }
        
        .sync-flash { animation: flash-green 0.6s ease-out; }
        @keyframes flash-green { 0% { border-color: #333; } 50% { border-color: #27ae60; box-shadow: 0 0 15px rgba(39, 174, 96, 0.3); } 100% { border-color: #333; } }

        .tumbler { flex: 1; height: 100%; overflow: hidden; position: relative; cursor: ns-resize; border-right: 1px solid #333; }
        .tumbler:last-child { border-right: none; }
        .item-list { position: absolute; width: 100%; top: 0; left: 0; padding-top: var(--item-height); pointer-events: none; }
        
        .item { height: var(--item-height); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; font-family: 'Consolas', monospace; color: var(--slot-text-muted); transition: all 0.2s ease; text-align: center; box-sizing: border-box; padding: 2px; background-clip: content-box; border-radius: calc(var(--slot-radius) + 2px); }
        .item.active-preview { color: var(--slot-text-active); }

        body.kids-mode .item.row-orange { background-color: #ff8c00; color: #fff !important; }
        body.kids-mode .item.row-green  { background-color: #27ae60; color: #fff !important; }
        body.kids-mode .item.row-purple { background-color: #8e44ad; color: #fff !important; }
        body.kids-mode .item.row-yellow { background-color: #ffff00; color: #000 !important; }
        body.kids-mode .item.row-red    { background-color: #e74c3c; color: #fff !important; }
        body.kids-mode .item.row-cyan   { background-color: #00bcd4; color: #fff !important; }

        .mail-layout { display: grid; grid-template-columns: 220px 220px 1fr; gap: 20px; min-height: 550px; }
        .mail-col { display: flex; flex-direction: column; gap: 10px; }
        .mail-header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
        .mail-header-row .icon-group { display: flex; gap: 8px; align-items: center; }
        .mail-col-label { font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--page-text-muted); }
        
        .mail-btn { padding: 12px; background: #eee; border: 2px solid transparent; border-radius: 8px; cursor: pointer; font-weight: bold; text-align: left; transition: all 0.2s; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 5px; }
        body.theme-dark .mail-btn { background: #2a2a2a; color: #ccc; }
        .mail-btn.selected { background: var(--template-green) !important; color: white !important; }
        .del-mode-active .mail-btn:hover { background: var(--delete-red) !important; color: white !important; transform: translateX(5px); }

        .move-controls { display: flex; flex-direction: column; gap: 2px; }
        .move-arrow { font-size: 9px; opacity: 0.5; padding: 2px; }
        .move-arrow:hover { opacity: 1; color: var(--accent); }

        #template-display { width: 100%; height: 250px; border: 1px solid var(--page-border); border-radius: 8px; padding: 20px; font-family: 'Consolas', monospace; font-size: 12px; background: #fff; color: #222; resize: none; box-sizing: border-box; outline: none; margin-bottom: 15px; }
        body.theme-dark #template-display { background: #1a1a1a; color: #eee; }
        #template-display.editing { border: 2px solid var(--accent); box-shadow: 0 0 8px rgba(0,122,255,0.2); }

        .modifier-container { display: flex; flex-direction: column; gap: 10px; border-top: 1px solid var(--page-border); padding-top: 15px; }
        .modifier-row { display: flex; align-items: center; gap: 10px; }
        .mod-input { flex: 1; background: #f9f9f9; border: 1px solid var(--page-border); padding: 10px; border-radius: 6px; font-family: 'Consolas'; font-size: 12px; color: #222; }
        body.theme-dark .mod-input { background: #252525; color: #e0e0e0; }

        .icon-btn { cursor: pointer; opacity: 0.6; transition: opacity 0.2s; font-size: 14px; }
        .icon-btn:hover { opacity: 1; }
        .active-del { color: var(--delete-red); opacity: 1; font-weight: bold; }
        .active-move { color: var(--accent); opacity: 1; }

        .optional-fields { display: flex; gap: 20px; margin-bottom: 30px; }
        .opt-input { flex: 1; background: #f9f9f9; border: 1px solid var(--page-border); padding: 15px; border-radius: 8px; font-family: 'Consolas'; color: #222; }
        body.theme-dark .opt-input { background: #252525; color: #e0e0e0; }
        
        button.action-btn { background: var(--accent); color: white; border: none; padding: 22px; font-size: 16px; font-weight: 700; border-radius: 8px; cursor: pointer; width: 100%; margin-bottom: 10px; transition: transform 0.1s; }
        button.action-btn:active { transform: scale(0.99); }
        button.replenish-btn { background: var(--accent) !important; padding: 10px; font-size: 11px; width: 180px; margin: 0 auto 10px 0; display: block; opacity: 0.9; text-transform: uppercase; }
        .template-btn { background: #333 !important; margin-top: 20px; }
        .manual-copy-btn { background: var(--template-green) !important; padding: 12px; font-size: 12px; font-weight: bold; text-transform: uppercase; cursor: pointer; border: none; border-radius: 6px; color: white; display: none; }

        .mail-data-actions { display: flex; gap: 10px; margin-top: 20px; border-top: 1px solid var(--page-border); padding-top: 20px; justify-content: center; }
        .data-btn { background: #444 !important; font-size: 11px !important; padding: 12px 25px !important; width: auto !important; }
        
        .footer-area { width: 100%; max-width: 1300px; padding: 20px; box-sizing: border-box; display: none; }
        .update-checker { background: var(--update-red); padding: 15px; border-radius: 8px; color: #fff; font-size: 12px; display: flex; align-items: center; justify-content: space-between; }
        .update-mini-btn { padding: 6px 14px; font-size: 10px; cursor: pointer; font-weight: bold; border: 1px solid #fff; background: rgba(255,255,255,0.1); color: #fff; border-radius: 4px; text-transform: uppercase; }
    </style>
</head>
<body class="theme-default">

<nav class="navbar">
    <div class="hover-toggle-container">
        <input type="checkbox" id="hoverToggle" onchange="saveHoverPreference()">
        <label for="hoverToggle">Hover Selection</label>
    </div>
    <div class="nav-links">
        <a id="nav-generator" class="nav-item active" onmouseenter="handleNavInteraction('generator', this)" onclick="showView('generator', this)">Case Title</a>
        <a id="nav-elevation" class="nav-item" onmouseenter="handleNavInteraction('elevation', this)" onclick="showView('elevation', this)">Elevation Generator</a>
        <a id="nav-mail" class="nav-item" onmouseenter="handleNavInteraction('mail', this)" onclick="showView('mail', this)">Mail Templates</a>
    </div>
    <div class="nav-right">
        <div class="settings-trigger" style="cursor:pointer; font-size: 20px;" onclick="toggleSettings()">⚙️</div>
    </div>
</nav>

<div class="settings-menu" id="settingsMenu">
    <div class="setting-row"><span>Theme</span><select id="themeSelect" onchange="changeTheme(this.value)"><option value="theme-default">Light</option><option value="theme-dark">Dark</option></select></div>
    <div class="setting-row"><span>Colored Slot Pills</span><input type="checkbox" id="kidsToggle" onchange="applySettings()"></div>
    <div class="setting-row"><span>Rounder Slot Pills</span><input type="checkbox" id="roundToggle" onchange="applySettings()"></div>
    <div class="setting-row"><span>Slot Animations</span><input type="checkbox" id="animToggle" checked onchange="applySettings()"></div>
    <hr style="opacity: 0.1; margin: 10px 0;">
    <button class="reset-btn" onclick="clearAllLocalData()">RESET ALL DATA</button>
</div>

<div id="generator-view" class="page-content active">
    <div class="generator-container">
        <div class="picker-wrapper" id="caseContainer"></div>
        <div class="optional-fields">
            <input type="text" id="opt1" class="opt-input" placeholder="Incident Number" onpaste="autoCopyOnPaste('case')">
            <input type="text" id="opt2" class="opt-input" placeholder="Other" onpaste="autoCopyOnPaste('case')">
        </div>
        <button class="action-btn" onclick="copyResult('case')">COPY CASE SEQUENCE</button>
        <div id="case-status" style="margin-top: 15px; font-weight: bold; color: var(--accent); text-align: center; height: 20px;"></div>
    </div>
</div>

<div id="elevation-view" class="page-content">
    <div class="generator-container" id="elevationBox">
        <div class="picker-wrapper" id="elevationContainer"></div>
        <div class="optional-fields"><input type="text" id="elevationAddon" class="opt-input" placeholder="CaseID" onpaste="autoCopyOnPaste('elevation')"></div>
        <button class="action-btn" onclick="copyResult('elevation')">COPY ELEVATION</button>
        <button class="action-btn template-btn" onclick="copyTemplateText('elevation-status')">"Please check the attached Elevation Template" - Copy Button</button>
        <div id="elevation-status" style="margin-top: 15px; font-weight: bold; color: var(--accent); text-align: center; height: 20px;"></div>
    </div>
</div>

<div id="mail-view" class="page-content">
    <div class="generator-container">
        <div class="mail-layout">
            <div class="mail-col" id="col-categories">
                <div class="mail-header-row">
                    <div class="mail-col-label">1a. English</div>
                    <div class="icon-group">
                        <span class="icon-btn" onclick="MailManager.renameCurrentCategory('en')">✎</span>
                        <span id="move-btn-en" class="icon-btn" onclick="MailManager.toggleMoveMode('en')">↕</span>
                        <span id="del-btn-en" class="icon-btn" onclick="MailManager.toggleDeleteMode('en')">🗑️</span>
                        <span class="icon-btn" onclick="MailManager.addCategory('en')">+</span>
                    </div>
                </div>
                <div id="cat-en" class="cat-group"></div>
                <div class="mail-header-row">
                    <div class="mail-col-label">1b. German</div>
                    <div class="icon-group">
                        <span class="icon-btn" onclick="MailManager.renameCurrentCategory('de')">✎</span>
                        <span id="move-btn-de" class="icon-btn" onclick="MailManager.toggleMoveMode('de')">↕</span>
                        <span id="del-btn-de" class="icon-btn" onclick="MailManager.toggleDeleteMode('de')">🗑️</span>
                        <span class="icon-btn" onclick="MailManager.addCategory('de')">+</span>
                    </div>
                </div>
                <div id="cat-de" class="cat-group"></div>
            </div>
            <div class="mail-col" id="col-templates">
                <div class="mail-header-row">
                    <div class="mail-col-label">2. Templates</div>
                    <div class="icon-group">
                        <span class="icon-btn" onclick="MailManager.renameCurrentTemplate()">✎</span>
                        <span id="move-btn-tpl" class="icon-btn" onclick="MailManager.toggleMoveMode('tpl')">↕</span>
                        <span id="del-btn-tpl" class="icon-btn" onclick="MailManager.toggleDeleteMode('tpl')">🗑️</span>
                        <span class="icon-btn" onclick="MailManager.addNewTemplate()">+</span>
                    </div>
                </div>
                <div id="tpl-list" class="template-list"></div>
            </div>
            <div class="mail-col">
                <div class="mail-header-row"><div class="mail-col-label">3. Content</div><span id="edit-pencil" class="icon-btn" onclick="MailManager.toggleEdit()">✎</span></div>
                <textarea id="template-display" readonly oninput="MailManager.updateLiveContent(this.value)"></textarea>
                
                <div class="mail-header-row">
                    <div class="mail-col-label">Modifiers</div>
                    <span class="icon-btn" onclick="ModifierManager.addModifier()">+</span>
                </div>
                <div id="modifier-list" class="modifier-container"></div>
                <button id="manual-copy-mod" class="manual-copy-btn" onclick="ModifierManager.manualCopy()">Copy Modified Template</button>
                <div id="mail-status" style="height:20px; color:var(--template-green); font-weight:bold; text-align:center; margin-top:5px;"></div>
            </div>
        </div>

        <div class="mail-data-actions">
            <button class="action-btn data-btn" onclick="MailManager.exportData()">EXPORT ALL TEMPLATES (JSON)</button>
            <button class="action-btn data-btn" onclick="document.getElementById('importFile').click()">IMPORT TEMPLATES</button>
            <input type="file" id="importFile" style="display:none" accept=".json" onchange="MailManager.importData(event)">
        </div>
    </div>
</div>

<div class="footer-area" id="footerUpdate">
    <div class="update-checker">
        <span id="update-msg">⚠️ A newer version is available!</span>
        <button class="update-mini-btn" onclick="openUpdate()">Open Latest</button>
    </div>
</div>

<script>
    const CURRENT_VERSION = 7;
    const BASE_URL = "https://aniums.github.io/Title%20GeneratorV";
    let LATEST_FOUND = "";
    const itemHeight = 50;

    const machines = {
        case: {
            containerId: 'caseContainer', statusId: 'case-status', 
            data: [['VAS'], ['AT', 'DE', 'CH'], ['Tel', 'Mail', 'Queue'], ['12H CTR', '16H CTF', '2BD', '2BD CTR', '2BD FIX', '2H', '4H', '4H CTF', '4H CTR', '4H OnSite', '6H CTR', '8H CTR', '8H FIX', 'NBD', 'NBD FIX', 'NBD Exchange', 'NBD CTR', 'NDA', 'SBD', 'SBD FIX'], ['Supply', 'SW', 'BF-TPM', 'PM', 'PM-CSR', 'PM-HYD', 'PM-BF', 'BF'], ['PMPS', 'DMPS', 'SMPS'], ['Pure', 'Trust Case_CBA', 'Trust Case_Contract Extension', 'Trust Case_Onboarding']],
            defaults: ["VAS", "DE", "Mail", "NBD", "BF-TPM", "DMPS", "Pure"], 
            lists: [],
            formatter: (vals) => {
                let base = vals.slice(0, 6).join(',') + ',';
                let slot7 = vals[6], opt1 = document.getElementById('opt1').value.trim(), opt2 = document.getElementById('opt2').value.trim();
                let res = base + ' //';
                if (slot7 !== 'Pure') res += ' ' + slot7;
                if (opt1) res += (slot7 === 'Pure') ? ' ' + opt1 : ' // ' + opt1;
                if (opt2) res += ' // ' + opt2;
                return res;
            }
        },
        elevation: {
            containerId: 'elevationContainer', statusId: 'elevation-status',
            data: [['AT', 'DE', 'CH'], ['HW', 'SW'], ['HEMM', 'BEG']],
            defaults: ["DE", "HW", "HEMM"], lists: [],
            formatter: (vals) => {
                let res = vals.join('/'), addon = document.getElementById('elevationAddon').value.trim();
                if (addon) res += '/' + addon;
                return res;
            }
        }
    };

    const ModifierManager = {
        customMods: JSON.parse(localStorage.getItem('mail-modifiers')) || [],
        init() { this.render(); },
        addModifier() {
            const name = prompt("Enter placeholder name (e.g. Phone Number):");
            if (name) {
                const tag = `[${name.toUpperCase()}]`;
                this.customMods.push({ label: name, tag: tag });
                this.save(); this.render();
            }
        },
        deleteModifier(idx) {
            if (confirm("Delete this modifier?")) {
                this.customMods.splice(idx, 1);
                this.save(); this.render();
            }
        },
        save() { localStorage.setItem('mail-modifiers', JSON.stringify(this.customMods)); },
        render() {
            const container = document.getElementById('modifier-list');
            container.innerHTML = `<div class="modifier-row"><input type="text" class="mod-input mod-field" data-tag="[CASE]" placeholder="CaseID [CASE]" onpaste="ModifierManager.handlePaste(event)"></div>`;
            this.customMods.forEach((mod, i) => {
                const div = document.createElement('div'); div.className = 'modifier-row';
                div.innerHTML = `<input type="text" class="mod-input mod-field" data-tag="${mod.tag}" placeholder="${mod.label} ${mod.tag}" onpaste="ModifierManager.handlePaste(event)"><span class="icon-btn active-del" onclick="ModifierManager.deleteModifier(${i})">🗑️</span>`;
                container.appendChild(div);
            });
            document.getElementById('manual-copy-mod').style.display = (this.customMods.length > 0) ? 'block' : 'none';
        },
        handlePaste(event) {
            if (this.customMods.length === 0) { setTimeout(() => { this.manualCopy(true); event.target.value = ""; }, 10); }
        },
        manualCopy(quiet = false) {
            const templateContent = document.getElementById('template-display').value;
            if (!templateContent) return;
            let finalContent = templateContent;
            const fields = document.querySelectorAll('.mod-field');
            fields.forEach(field => {
                const tag = field.getAttribute('data-tag'), val = field.value;
                if (val && finalContent.includes(tag)) finalContent = finalContent.split(tag).join(val);
            });
            navigator.clipboard.writeText(finalContent);
            MailManager.notify("COPIED MODIFIED TEMPLATE");
            if (!quiet) fields.forEach(f => f.value = "");
        }
    };

    const MailManager = {
        isEditing: false, 
        deleteMode: { en: false, de: false, tpl: false },
        moveMode: { en: false, de: false, tpl: false },
        activeLang: 'en', activeCat: 'Team', activeTplIdx: null,
        data: JSON.parse(localStorage.getItem('mail-templates-v2')) || { en: { Team: [] }, de: { Team: [] } },

        init() { this.renderCategories(); this.renderTemplates(); ModifierManager.init(); },

        toggleDeleteMode(t) {
            this.deleteMode[t] = !this.deleteMode[t];
            if(this.deleteMode[t]) this.moveMode[t] = false;
            this.syncIcons(t);
        },

        toggleMoveMode(t) {
            this.moveMode[t] = !this.moveMode[t];
            if(this.moveMode[t]) this.deleteMode[t] = false;
            this.syncIcons(t);
            this.renderCategories();
            this.renderTemplates();
        },

        syncIcons(t) {
            document.getElementById(`del-btn-${t}`).classList.toggle('active-del', this.deleteMode[t]);
            document.getElementById(`move-btn-${t}`).classList.toggle('active-move', this.moveMode[t]);
            const colId = (t === 'tpl') ? 'col-templates' : 'col-categories';
            document.getElementById(colId).classList.toggle('del-mode-active', this.deleteMode[t]);
        },

        addCategory(lang) {
            const name = prompt(`Category for ${lang.toUpperCase()}:`);
            if (name && !this.data[lang][name]) { this.data[lang][name] = []; this.save(); this.renderCategories(); }
        },

        renameCurrentCategory(lang) {
            if (this.activeLang !== lang) return;
            const newName = prompt("Rename current category:", this.activeCat);
            if (newName && newName !== this.activeCat) {
                this.data[lang][newName] = this.data[lang][this.activeCat];
                delete this.data[lang][this.activeCat];
                this.activeCat = newName;
                this.save(); this.renderCategories();
            }
        },

        renameCurrentTemplate() {
            if (this.activeTplIdx === null) return;
            const tpl = this.data[this.activeLang][this.activeCat][this.activeTplIdx];
            const newName = prompt("Rename template:", tpl.name);
            if (newName) {
                tpl.name = newName;
                this.save(); this.renderTemplates();
            }
        },

        moveItem(type, index, dir) {
            if (type === 'cat') {
                const keys = Object.keys(this.data[this.activeLang]);
                if ((dir === -1 && index > 0) || (dir === 1 && index < keys.length - 1)) {
                    const entries = Object.entries(this.data[this.activeLang]);
                    [entries[index], entries[index + dir]] = [entries[index + dir], entries[index]];
                    const newData = {};
                    entries.forEach(([k, v]) => newData[k] = v);
                    this.data[this.activeLang] = newData;
                }
            } else {
                const list = this.data[this.activeLang][this.activeCat];
                if ((dir === -1 && index > 0) || (dir === 1 && index < list.length - 1)) {
                    [list[index], list[index + dir]] = [list[index + dir], list[index]];
                    if (this.activeTplIdx === index) this.activeTplIdx = index + dir;
                    else if (this.activeTplIdx === index + dir) this.activeTplIdx = index;
                }
            }
            this.save(); this.renderCategories(); this.renderTemplates();
        },

        renderCategories() {
            const renderSet = (lang, cid) => {
                const cont = document.getElementById(cid); cont.innerHTML = '';
                const cats = Object.keys(this.data[lang]);
                cats.forEach((cat, i) => {
                    const btn = document.createElement('div');
                    btn.className = `mail-btn ${this.activeLang === lang && this.activeCat === cat ? 'selected' : ''}`;
                    
                    let moveControls = '';
                    if (this.moveMode[lang]) {
                        moveControls = `<div class="move-controls">
                            <span class="move-arrow" onclick="event.stopPropagation(); MailManager.moveItem('cat', ${i}, -1)">▲</span>
                            <span class="move-arrow" onclick="event.stopPropagation(); MailManager.moveItem('cat', ${i}, 1)">▼</span>
                        </div>`;
                    }

                    btn.innerHTML = moveControls + `<span>${cat}</span>`;
                    btn.onclick = () => {
                        if (this.deleteMode[lang]) { 
                            if(confirm("Delete Category?")) { delete this.data[lang][cat]; this.save(); this.renderCategories(); } 
                        } else { 
                            this.activeLang = lang; this.activeCat = cat; this.activeTplIdx = null; 
                            this.renderCategories(); this.renderTemplates(); 
                        }
                    };
                    cont.appendChild(btn);
                });
            };
            renderSet('en', 'cat-en'); renderSet('de', 'cat-de');
        },

        renderTemplates() {
            const list = document.getElementById('tpl-list'); list.innerHTML = '';
            const tpls = this.data[this.activeLang][this.activeCat] || [];
            tpls.forEach((t, i) => {
                const btn = document.createElement('div');
                btn.className = `mail-btn ${this.activeTplIdx === i ? 'selected' : ''}`;
                
                let moveControls = '';
                if (this.moveMode['tpl']) {
                    moveControls = `<div class="move-controls">
                        <span class="move-arrow" onclick="event.stopPropagation(); MailManager.moveItem('tpl', ${i}, -1)">▲</span>
                        <span class="move-arrow" onclick="event.stopPropagation(); MailManager.moveItem('tpl', ${i}, 1)">▼</span>
                    </div>`;
                }

                btn.innerHTML = moveControls + `<span>${t.name}</span>`;
                btn.onclick = () => { 
                    if (this.deleteMode.tpl) { 
                        if(confirm("Delete Template?")) { this.data[this.activeLang][this.activeCat].splice(i, 1); this.save(); this.renderTemplates(); } 
                    } else { this.selectTemplate(i); } 
                };
                list.appendChild(btn);
            });
            if (this.activeTplIdx === null) document.getElementById('template-display').value = '';
        },

        selectTemplate(idx) {
            this.activeTplIdx = idx;
            const tpl = this.data[this.activeLang][this.activeCat][idx];
            document.getElementById('template-display').value = tpl.content;
            this.renderTemplates();
            if(!this.isEditing) { navigator.clipboard.writeText(tpl.content); this.notify("COPIED"); }
        },

        toggleEdit() {
            if (this.activeTplIdx === null) return;
            this.isEditing = !this.isEditing;
            const display = document.getElementById('template-display');
            const pencil = document.getElementById('edit-pencil');
            display.readOnly = !this.isEditing;
            display.classList.toggle('editing', this.isEditing);
            pencil.textContent = this.isEditing ? "💾" : "✎";
            if (!this.isEditing) { this.save(); this.notify("SAVED"); }
        },

        updateLiveContent(v) { if(this.isEditing && this.activeTplIdx !== null) this.data[this.activeLang][this.activeCat][this.activeTplIdx].content = v; },

        addNewTemplate() {
            const name = prompt("Name:");
            if(name) {
                if(!this.data[this.activeLang][this.activeCat]) this.data[this.activeLang][this.activeCat] = [];
                this.data[this.activeLang][this.activeCat].push({name, content: ""});
                this.save(); this.renderTemplates();
            }
        },

        save() { localStorage.setItem('mail-templates-v2', JSON.stringify(this.data)); },

        notify(msg, isErr = false) { 
            const st = document.getElementById('mail-status'); 
            st.textContent = msg; 
            st.style.color = isErr ? 'var(--delete-red)' : 'var(--template-green)';
            setTimeout(() => st.textContent = "", 2000); 
        },

        exportData() {
            const dataStr = JSON.stringify(this.data, null, 2);
            const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
            const linkElement = document.createElement('a');
            linkElement.setAttribute('href', dataUri); linkElement.setAttribute('download', `templates.json`);
            linkElement.click();
        },

        importData(event) {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (confirm("OVERWRITE CURRENT TEMPLATES?")) { this.data = imported; this.save(); this.init(); this.notify("IMPORT SUCCESS"); }
                } catch (err) { alert("Error reading JSON file."); }
            };
            reader.readAsText(file); event.target.value = ""; 
        }
    };

    function autoCopyOnPaste(k) { setTimeout(() => copyResult(k), 0); }
    function clearAllLocalData() { if (confirm("Delete everything?")) { localStorage.clear(); location.reload(); } }

    async function checkUpdates() {
        for (let i = CURRENT_VERSION + 1; i <= CURRENT_VERSION + 3; i++) {
            try {
                const response = await fetch(`${BASE_URL}${i}.html`, { method: 'HEAD', cache: 'no-cache' });
                if (response.ok) { LATEST_FOUND = `${BASE_URL}${i}.html`; document.getElementById('footerUpdate').style.display = "block"; }
            } catch (e) {}
        }
    }

    function openUpdate() { if(LATEST_FOUND) window.open(LATEST_FOUND, '_blank'); }
    function saveHoverPreference() { localStorage.setItem('nav-hover-enabled', document.getElementById('hoverToggle').checked); }
    function handleNavInteraction(viewId, el) { if (document.getElementById('hoverToggle').checked) showView(viewId, el); }
    
    function showView(id, el) {
        document.querySelectorAll('.page-content, .nav-item').forEach(x => x.classList.remove('active'));
        document.getElementById(id + '-view').classList.add('active'); el.classList.add('active');
    }

    function toggleSettings() { document.getElementById('settingsMenu').classList.toggle('open'); }
    function changeTheme(v) { localStorage.setItem('user-theme', v); applySettings(); }

    function applySettings() {
        const theme = localStorage.getItem('user-theme') || 'theme-default', 
              kids = document.getElementById('kidsToggle').checked, 
              round = document.getElementById('roundToggle').checked, 
              anims = document.getElementById('animToggle').checked;
        document.body.className = `${theme} ${kids?'kids-mode':''} ${round?'rounder-slots':''} ${!anims?'no-animations':''}`;
        localStorage.setItem('kids-mode', kids); 
        localStorage.setItem('round-slots', round); 
        localStorage.setItem('slot-anims', anims);
    }

    function getKidsClass(col, rowIdx, mKey) {
        const m = machines[mKey], diff = rowIdx - m.data[col].indexOf(m.defaults[col]);
        if (diff === 0) return '';
        const colors = { '-2':'row-yellow', '-1':'row-cyan', '1':'row-orange', '2':'row-green', '3':'row-purple', '4':'row-red' };
        return colors[diff] || 'row-orange';
    }

    function checkCoupling(key, col, val) {
        if (key !== 'elevation' || col !== 0) return;
        const targetIdx = (val === 'AT') ? 1 : (val === 'DE') ? 0 : -1;
        if (targetIdx !== -1) {
            const list = machines.elevation.lists[2]; list.style.top = -(targetIdx * itemHeight) + 'px';
            updateActiveStyles(list);
            document.getElementById('elevationContainer').classList.remove('sync-flash');
            void document.getElementById('elevationContainer').offsetWidth;
            document.getElementById('elevationContainer').classList.add('sync-flash');
        }
    }

    function updateActiveStyles(list) {
        const idx = Math.abs(Math.round((parseInt(list.style.top) || 0) / itemHeight));
        list.querySelectorAll('.item').forEach((it, i) => it.classList.toggle('active-preview', i === idx));
    }

    function initMachine(key) {
        const m = machines[key], container = document.getElementById(m.containerId);
        m.data.forEach((data, col) => {
            const tumbler = document.createElement('div'); tumbler.className = 'tumbler';
            const list = document.createElement('div'); list.className = 'item-list';
            list.style.top = -(data.indexOf(m.defaults[col]) * itemHeight) + 'px';
            m.lists.push(list);
            data.forEach((text, rowIdx) => {
                const item = document.createElement('div'); item.className = 'item ' + getKidsClass(col, rowIdx, key);
                item.textContent = (key === 'case' && col === 6) ? (text === 'Pure' ? '//' : '// ' + text) : text;
                list.appendChild(item);
            });
            tumbler.appendChild(list); container.appendChild(tumbler);
            let isD = false, sY = 0, cT = 0;
            tumbler.onmousedown = (e) => { isD = true; sY = e.clientY; cT = parseInt(list.style.top) || 0; list.style.transition = 'none'; };
            window.addEventListener('mousemove', (e) => { if (!isD) return; list.style.top = (cT + (e.clientY - sY)) + 'px'; updateActiveStyles(list); });
            window.addEventListener('mouseup', () => { 
                if (!isD) return; isD = false; 
                let fI = Math.max(-(data.length - 1), Math.min(0, Math.round(parseInt(list.style.top) / itemHeight))); 
                list.style.transition = 'top 0.2s cubic-bezier(0.2, 0.8, 0.2, 1)'; 
                list.style.top = (fI * itemHeight) + 'px'; updateActiveStyles(list);
                checkCoupling(key, col, data[Math.abs(fI)]);
            });
            tumbler.onwheel = (e) => { 
                e.preventDefault(); 
                let currentTop = parseInt(list.style.top) || 0;
                let nextTop = currentTop + (e.deltaY > 0 ? -itemHeight : itemHeight);
                if (nextTop <= 0 && nextTop >= -((data.length - 1) * itemHeight)) { 
                    list.style.transition = 'top 0.2s cubic-bezier(0.2, 0.8, 0.2, 1)'; 
                    list.style.top = nextTop + 'px'; updateActiveStyles(list);
                    checkCoupling(key, col, data[Math.abs(nextTop / itemHeight)]);
                } 
            };
            updateActiveStyles(list);
        });
    }

    function copyResult(key) {
        const m = machines[key];
        const currentVals = m.lists.map((list, col) => {
            const idx = Math.abs(Math.round((parseInt(list.style.top) || 0) / itemHeight));
            return m.data[col][idx];
        });
        const text = m.formatter(currentVals);
        navigator.clipboard.writeText(text);
        const st = document.getElementById(m.statusId);
        st.textContent = "COPIED TO CLIPBOARD";
        setTimeout(() => st.textContent = "", 2000);
    }

    function copyReplenishment() {
        const text = "Replenishment // Parts required for repair";
        navigator.clipboard.writeText(text);
        const st = document.getElementById('case-status');
        st.textContent = "REPLENISHMENT COPIED";
        setTimeout(() => st.textContent = "", 2000);
    }

    function copyTemplateText(statusId) {
        const text = "Please check the attached Elevation Template";
        navigator.clipboard.writeText(text);
        const st = document.getElementById(statusId);
        st.textContent = "TEMPLATE TEXT COPIED";
        setTimeout(() => st.textContent = "", 2000);
    }

    window.onload = () => {
        initMachine('case');
        initMachine('elevation');
        MailManager.init();
        document.getElementById('hoverToggle').checked = localStorage.getItem('nav-hover-enabled') === 'true';
        document.getElementById('kidsToggle').checked = localStorage.getItem('kids-mode') === 'true';
        document.getElementById('roundToggle').checked = localStorage.getItem('round-slots') === 'true';
        document.getElementById('animToggle').checked = (localStorage.getItem('slot-anims') !== 'false');
        document.getElementById('themeSelect').value = localStorage.getItem('user-theme') || 'theme-default';
        applySettings();
        checkUpdates();
    };
</script>
</body>

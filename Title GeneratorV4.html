<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sequence Generator - Themed</title>
    <style id="theme-style">
        :root {
            --bg-color: #121212;
            --box-bg: #1e1e1e;
            --machine-bg: #ffffff;
            --accent: #007aff;
            --text-main: #888;
            --text-active: #000;
            --item-height: 50px;
            --lens-bg: rgba(0, 122, 255, 0.1);
        }

        /* --- THEME VARIATIONS --- */
        body.theme-old-midnight {
            --bg-color: #f0f2f5;
            --box-bg: #ffffff;
            --machine-bg: #1e1e1e;
            --accent: #007aff;
            --text-main: #777;
            --text-active: #fff;
            --lens-bg: rgba(255, 255, 255, 0.07);
        }
        body.theme-cyberpunk {
            --bg-color: #0d0221;
            --box-bg: #0d0221;
            --machine-bg: #000;
            --accent: #ff00ff;
            --text-main: #00ffcc;
            --text-active: #ff00ff;
            --lens-bg: rgba(255, 0, 255, 0.1);
        }
        body.theme-mac {
            --bg-color: #e0e0e0;
            --box-bg: #ffffff;
            --machine-bg: #f5f5f7;
            --accent: #0071e3;
            --text-main: #86868b;
            --text-active: #1d1d1f;
            --lens-bg: rgba(0, 0, 0, 0.05);
        }
        body.theme-terminal {
            --bg-color: #000;
            --box-bg: #000;
            --machine-bg: #050505;
            --accent: #00ff00;
            --text-main: #004400;
            --text-active: #00ff00;
            --lens-bg: rgba(0, 255, 0, 0.05);
        }
        body.theme-berry {
            --bg-color: #fce4ec;
            --box-bg: #ffffff;
            --machine-bg: #f8f9fa;
            --accent: #9c27b0;
            --text-main: #9e9e9e;
            --text-active: #9c27b0;
            --lens-bg: rgba(156, 39, 176, 0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            user-select: none;
            transition: background 0.3s ease;
        }

        .theme-selector { position: fixed; top: 20px; right: 20px; z-index: 100; }
        select { padding: 8px 12px; border-radius: 6px; border: 1px solid #444; background: #fff; font-weight: bold; cursor: pointer; }

        .generator-box {
            background: var(--box-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            width: 98%;
            max-width: 1400px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .picker-wrapper {
            display: flex;
            position: relative;
            height: calc(var(--item-height) * 3);
            background: var(--machine-bg);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 25px;
            border: 3px solid #333;
        }

        .picker-wrapper::before {
            content: '';
            position: absolute;
            top: 50%; left: 0; right: 0;
            height: var(--item-height);
            background: var(--lens-bg);
            transform: translateY(-50%);
            pointer-events: none;
            border-top: 1px solid rgba(0,0,0,0.1);
            border-bottom: 1px solid rgba(0,0,0,0.1);
            z-index: 10;
        }

        .tumbler {
            flex: 1;
            height: 100%;
            overflow: hidden;
            position: relative;
            cursor: ns-resize;
            border-right: 1px solid rgba(0,0,0,0.05);
        }

        .tumbler:nth-child(1) { flex: 0.7; } 
        .tumbler:nth-child(2) { flex: 0.6; } 
        .tumbler:nth-child(4) { flex: 1.5; } 
        .tumbler:nth-child(7) { flex: 2.8; } 

        .item-list { position: absolute; width: 100%; top: 0; left: 0; padding-top: var(--item-height); }
        .item {
            height: var(--item-height);
            display: flex;
            align-items: center;
            padding: 0 10px;
            font-size: 13px;
            font-weight: 600;
            font-family: 'Consolas', monospace; 
            color: var(--text-main);
            transition: color 0.2s;
            white-space: pre; 
        }
        .item.active-preview { color: var(--text-active); }

        button#copyBtn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 18px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
        }

        #copy-status { margin-top: 15px; height: 24px; font-weight: bold; color: var(--accent); text-align: center; }

        .footer-info {
            position: fixed;
            bottom: 20px;
            width: 95%;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            pointer-events: none;
        }

        /* --- UPDATER STYLE --- */
        .update-checker, .changelog-box {
            background: #1e1e1e;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--accent);
            color: #888;
            font-size: 11px;
            pointer-events: auto;
            max-width: 300px;
            transition: all 0.3s ease;
        }

        /* Update States */
        .status-up-to-date { background: #1b5e20 !important; border-color: #4caf50 !important; color: #fff !important; }
        .status-update-found { background: #b71c1c !important; border-color: #f44336 !important; color: #fff !important; }

        .changelog-box { text-align: right; }
        .changelog-box b { color: var(--accent); display: block; margin-bottom: 5px; }
        .update-actions { margin-top: 8px; display: none; gap: 5px; }
        .action-btn {
            padding: 4px 8px; font-size: 10px; cursor: pointer;
            border: 1px solid #fff; background: transparent; color: #fff; border-radius: 3px;
        }
        .action-btn:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body class="theme-midnight-plus-max">

<div class="theme-selector">
    <select id="styleSwitcher">
        <option value="theme-midnight-plus-max">Midnight Pro Plus MAX</option>
        <option value="theme-old-midnight">Old, not so Midnight Pro</option>
        <option value="theme-cyberpunk">Cyberpunk Neon</option>
        <option value="theme-mac">Classic Mac</option>
        <option value="theme-terminal">Retro Terminal</option>
        <option value="theme-berry">Soft Berry</option>
    </select>
</div>

<div class="generator-box">
    <div class="picker-wrapper" id="mainContainer"></div>
    <button id="copyBtn">COPY SEQUENCE</button>
    <div id="copy-status"></div>
</div>

<div class="footer-info">
    <div class="update-checker" id="updateStatus">
        <div id="update-msg">Auto-checking updates...</div>
        <div class="update-actions" id="updateActions">
            <button class="action-btn" onclick="copyUpdate()">Copy Link</button>
            <button class="action-btn" onclick="openUpdate()">Open New Tab</button>
        </div>
    </div>

    <div class="changelog-box">
        <b>Changelog:</b>
        • Updated updater with Red/Green status colors (Mar 2, 2026)<br>
        • Added Midnight Pro Plus MAX (Inverted) (Mar 2, 2026)<br>
        • Added "Supply," to slot 5 (Mar 2, 2026)<br>
        • Auto-update checker implemented (Mar 2, 2026)
    </div>
</div>

<script>
    const CURRENT_VERSION = 4;
    const BASE_URL = "https://aniums.github.io/Title%20GeneratorV";
    let LATEST_FOUND = "";

    const sequenceData = [
        ['VAS,'], 
        ['AT,', 'DE,', 'CH,'], 
        ['Tel,', 'Mail,', 'Queue,'], 
        ['12H CTR,', '16H CTF,', '2BD,', '2BD CTR,', '2BD FIX,', '2H,', '4H,', '4H CTF,', '4H CTR,', '4H OnSite,', '6H CTR,', '8H CTR,', '8H FIX,', 'NBD,', 'NBD FIX,', 'NBD Exchange,', 'NBD CTR,', 'NDA,', 'SBD,', 'SBD FIX,'], 
        ['Supply,', 'SW,', 'BF-TPM,', 'PM,', 'PM-CSR,', 'PM-HYD,', 'PM-BF,', 'BF,'], 
        ['DMPS,', 'PMPS,', 'SMPS,'], 
        [' //', ' //Trust Case_CBA', ' //Trust Case_Contract Extension', ' //Trust Case_Onboarding']
    ];

    const defaults = ["VAS,", "DE,", "Mail,", "NBD,", "BF-TPM,", "DMPS,", " //"];
    const itemHeight = 50; 
    const container = document.getElementById('mainContainer');

    sequenceData.forEach((data, colIndex) => {
        const tumbler = document.createElement('div');
        tumbler.className = 'tumbler';
        const itemList = document.createElement('div');
        itemList.className = 'item-list';
        const defaultIndex = data.indexOf(defaults[colIndex]);
        itemList.style.top = defaultIndex !== -1 ? -(defaultIndex * itemHeight) + 'px' : '0px';

        data.forEach(text => {
            const item = document.createElement('div');
            item.className = 'item';
            item.textContent = text;
            itemList.appendChild(item);
        });

        tumbler.appendChild(itemList);
        container.appendChild(tumbler);

        let isDragging = false, startY = 0, currentTop = 0;

        const updateActive = () => {
            const top = parseInt(itemList.style.top);
            const index = Math.abs(Math.round(top / itemHeight));
            itemList.querySelectorAll('.item').forEach((it, idx) => it.classList.toggle('active-preview', idx === index));
        };

        tumbler.onmousedown = (e) => {
            isDragging = true; startY = e.clientY;
            currentTop = parseInt(itemList.style.top);
            itemList.style.transition = 'none';
        };

        window.onmousemove = (e) => {
            if (!isDragging) return;
            itemList.style.top = (currentTop + (e.clientY - startY)) + 'px';
            updateActive();
        };

        window.onmouseup = () => {
            if (!isDragging) return;
            isDragging = false;
            let finalTop = Math.max(-((data.length - 1) * itemHeight), Math.min(0, parseInt(itemList.style.top)));
            itemList.style.top = (Math.round(finalTop / itemHeight) * itemHeight) + 'px';
            itemList.style.transition = 'top 0.1s ease-out';
            setTimeout(updateActive, 20);
        };

        tumbler.onwheel = (e) => {
            e.preventDefault();
            let newTop = parseInt(itemList.style.top) + (e.deltaY > 0 ? -itemHeight : itemHeight);
            if (newTop <= 0 && newTop >= -((data.length - 1) * itemHeight)) {
                itemList.style.top = newTop + 'px';
                updateActive();
            }
        };
        updateActive();
    });

    // --- UPDATED AUTO UPDATE CHECKER ---
    async function checkUpdates() {
        const box = document.getElementById('updateStatus');
        const msg = document.getElementById('update-msg');
        let found = false;

        for (let i = CURRENT_VERSION + 1; i <= CURRENT_VERSION + 3; i++) {
            const testUrl = `${BASE_URL}${i}.html`;
            try {
                const response = await fetch(testUrl, { method: 'HEAD', cache: 'no-cache' });
                if (response.ok) {
                    LATEST_FOUND = testUrl;
                    found = true;
                }
            } catch (e) {}
        }

        if (found) {
            box.classList.add('status-update-found');
            msg.textContent = "There is a newer version for this generator";
            document.getElementById('updateActions').style.display = "flex";
        } else {
            box.classList.add('status-up-to-date');
            msg.textContent = "You have the latest link to the generator.";
        }
    }

    window.onload = () => {
        setTimeout(checkUpdates, 500);
    };

    function copyUpdate() { navigator.clipboard.writeText(LATEST_FOUND); alert("Copied!"); }
    function openUpdate() { window.open(LATEST_FOUND, '_blank'); }

    document.getElementById('copyBtn').onclick = () => {
        let res = "";
        document.querySelectorAll('.item-list').forEach((list, i) => {
            const idx = Math.abs(Math.round(parseInt(list.style.top) / itemHeight));
            res += sequenceData[i][idx];
        });
        navigator.clipboard.writeText(res).then(() => {
            document.getElementById('copy-status').textContent = "COPIED: " + res;
            setTimeout(() => document.getElementById('copy-status').textContent = "", 3000);
        });
    };

    const switcher = document.getElementById('styleSwitcher');
    const savedTheme = localStorage.getItem('user-theme') || 'theme-midnight-plus-max';
    document.body.className = savedTheme;
    switcher.value = savedTheme;
    switcher.onchange = (e) => {
        document.body.className = e.target.value;
        localStorage.setItem('user-theme', e.target.value);
    };
</script>
</body>
</html>
